{% extends 'base.html' %}
{% block header %}{{ doctor.name }}{% endblock %}
{% block container %}
<div class="grid">
    {% for disease in diseases %}
    <div class="card">
        <a href="{{ url_for('doctor_patients', doctor_id=doctor.id, disease_id=disease.id) }}">
            <h2>{{ disease.name }}</h2>
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
